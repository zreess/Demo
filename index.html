<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>
<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

.container{
    background: rgba(0,0,0,0.3);
    padding:40px;
    border-radius:12px;
}

h1{
    font-size:48px;
    margin-bottom:10px;
}

p{
    font-size:18px;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
    background:white;
    color:#333;
}
button:hover{
    background:#f0f0f0;
}
</style>
</head>

<body>

<div class="container">
    <h1>Welcome 👋</h1>
    <p>We're glad you're here. Explore and enjoy your stay!</p>
    <button onclick="alert('Let’s get started!')">Get Started</button>
</div>

</body>
</html>
